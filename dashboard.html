<!DOCTYPE html>
<html>
<head>
    <title>CarbonTrack Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
    <h1>🌱 Welcome, <span id="userDisplay"></span></h1>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="card">
        <h2>Carbon Calculator</h2>

        <input type="number" id="electricity" placeholder="Monthly Electricity (kWh)">
        <input type="number" id="car" placeholder="Car Travel per Month (km)">
        <input type="number" id="flights" placeholder="Flights per Year">

        <select id="diet">
            <option value="veg">Vegetarian</option>
            <option value="nonveg">Non-Vegetarian</option>
        </select>

        <button onclick="calculate()">Calculate</button>
    </div>

    <div class="card hidden" id="resultCard">
        <h2>Your Annual Footprint</h2>
        <h3 id="totalCO2">0</h3>
        <p id="trees"></p>
        <canvas id="chart"></canvas>
        <p id="suggestions"></p>
        <button onclick="downloadPDF()">Download Report</button>
    </div>

    <div class="card">
        <h2>🏆 Leaderboard (Lowest CO₂)</h2>
        <ul id="leaderboard"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
