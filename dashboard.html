<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbonTrack Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
<h2>Welcome, <span id="userDisplay"></span></h2>
<button id="logoutBtn">Logout</button>
</header>

<div class="grid">

<div class="glass-card">
<h3>Carbon Calculator</h3>

<select id="country">
<option value="india">India</option>
<option value="usa">USA</option>
<option value="uk">UK</option>
</select>

<input type="number" id="electricity" placeholder="Monthly Electricity (kWh)">
<input type="number" id="car" placeholder="Car Travel per Month (km)">
<input type="number" id="flights" placeholder="Flights per Year">

<select id="diet">
<option value="veg">Vegetarian</option>
<option value="nonveg">Non-Vegetarian</option>
</select>

<button id="calculateBtn">Calculate Footprint</button>
</div>

<div class="glass-card hidden" id="resultSection">
<h3>Annual Carbon Footprint</h3>
<h1 id="totalOutput">0 kg</h1>
<p id="comparison"></p>
<p id="trees"></p>
<canvas id="chart"></canvas>
<p id="suggestions"></p>
<button id="pdfBtn">Download Report</button>
</div>

<div class="glass-card">
<h3>🏆 Top Low Emitters</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script src="js/app.js"></script>
</body>
</html>
