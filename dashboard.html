<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbonTrack Pro | Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
    <h2>Welcome, <span id="userName"></span></h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Carbon Calculator</h3>

<input type="number" id="electricity" placeholder="Monthly Electricity (kWh)">
<input type="number" id="car" placeholder="Car Travel per Month (km)">
<input type="number" id="flights" placeholder="Flights per Year">

<select id="diet">
<option value="veg">Vegetarian</option>
<option value="nonveg">Non-Vegetarian</option>
</select>

<button onclick="calculate()">Calculate</button>
</div>

<div class="card hidden" id="resultCard">
<h3>Your Annual Carbon Footprint</h3>
<h2 id="totalCO2">0 kg</h2>
<p id="trees"></p>
<canvas id="chart"></canvas>
<p id="suggestions"></p>
<button onclick="downloadPDF()">Download PDF Report</button>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
